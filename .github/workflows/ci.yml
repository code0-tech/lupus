name: CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"

jobs:
  check:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Build workspace
        run: cargo build --workspace --locked

      - name: Test workspace
        run: cargo test --workspace --locked

      - name: Lint workspace
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

  publish:
    name: Publish lupus
    if: startsWith(github.ref, 'refs/tags/v')
    needs: check
    runs-on: ubuntu-latest
    environment: crates-io
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Verify tag matches crate version
        shell: bash
        run: |
          set -euo pipefail
          crate_version="$(cargo metadata --no-deps --format-version 1 |
            jq -r '.packages[] | select(.name == "lupus") | .version')"
          tag_version="${GITHUB_REF_NAME#v}"
          if [[ "$tag_version" != "$crate_version" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match lupus version $crate_version" >&2
            exit 1
          fi

      - name: Publish to crates.io
        run: cargo publish -p lupus --locked
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  msrv:
    name: Minimum supported Rust
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install Rust 1.88
        uses: dtolnay/rust-toolchain@1.88

      - name: Check library with MSRV
        run: cargo check -p lupus --locked
